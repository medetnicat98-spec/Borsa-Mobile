<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Borsa Timsahı Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #000; touch-action: manipulation; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); }
        .hidden-app { display: none; }
        .fade-out { opacity: 0; transition: 1.5s; pointer-events: none; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .letter { display: inline-block; animation: slideIn 0.5s forwards; }
        input, textarea { border: 1px solid #333 !important; }
        .table-container { overflow-x: auto; }
    </style>
</head>
<body class="text-white min-h-screen">

    <div id="splash" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black transition duration-1000">
        <div class="text-emerald-500 text-7xl mb-6 animate-pulse">🐊</div>
        <div id="brand-text" class="text-2xl font-black text-white flex gap-1"></div>
    </div>

    <div id="app" class="hidden-app p-4 pb-20 max-w-2xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl font-black text-white">BORSA</h1>
                <h1 class="text-xl font-black text-emerald-500 -mt-1">TİMSAHI PRO</h1>
            </div>
            <div class="text-right">
                <div class="text-[9px] text-gray-500 uppercase tracking-widest font-bold">Toplam Kasa</div>
                <div id="stats" class="text-sm font-black font-mono text-emerald-400">0.00 ₺</div>
            </div>
        </header>

        <div class="glass p-3 rounded-2xl border border-gray-800 mb-6 h-48">
            <canvas id="profitChart"></canvas>
        </div>

        <div class="glass p-5 rounded-3xl border border-gray-800 space-y-3 mb-6">
            <input id="sym" placeholder="Hisse (Örn: THYAO)" class="w-full bg-gray-900 p-4 rounded-xl outline-none">
            <div class="grid grid-cols-2 gap-3">
                <input id="buy" type="number" placeholder="Alış" class="bg-gray-900 p-4 rounded-xl outline-none">
                <input id="sell" type="number" placeholder="Satış" class="bg-gray-900 p-4 rounded-xl outline-none">
            </div>
            <input id="lot" type="number" placeholder="Lot" class="w-full bg-gray-900 p-4 rounded-xl outline-none">
            <textarea id="note" placeholder="Not ekle..." class="w-full bg-gray-900 p-4 rounded-xl outline-none h-20 text-sm"></textarea>
            <button onclick="addTrade()" class="w-full bg-emerald-600 rounded-xl font-bold py-4 active:scale-95 transition">İŞLEMİ KAYDET</button>
        </div>

        <div class="glass p-4 rounded-2xl border border-gray-800 table-container">
            <h2 class="text-xs font-bold text-gray-500 mb-4 uppercase">İşlem Defteri</h2>
            <table class="w-full text-left text-xs">
                <thead>
                    <tr class="text-gray-500 border-b border-gray-800">
                        <th class="pb-2">TARİH</th>
                        <th class="pb-2">HİSSE</th>
                        <th class="pb-2 text-right">KÂR</th>
                    </tr>
                </thead>
                <tbody id="history-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        let trades = JSON.parse(localStorage.getItem('trades')) || [];
        let myChart;

        // ANIMASYON
        const brand = "TİMSAH MOBİL";
        const container = document.getElementById('brand-text');
        brand.split('').forEach((char, i) => {
            const span = document.createElement('span');
            span.innerText = char;
            span.className = 'letter';
            span.style.animationDelay = `${i * 0.1}s`;
            container.appendChild(span);
        });

        setTimeout(() => {
            document.getElementById('splash').classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('app').classList.remove('hidden-app');
                initChart();
                render();
            }, 1000);
        }, 2500);

        function addTrade() {
            const sym = document.getElementById('sym').value.toUpperCase();
            const buy = parseFloat(document.getElementById('buy').value);
            const sell = parseFloat(document.getElementById('sell').value);
            const lot = parseFloat(document.getElementById('lot').value);
            const note = document.getElementById('note').value;
            if(!sym || !buy || !sell || !lot) return;
            
            // Tarih ve saat ekleme
            const now = new Date();
            const dateStr = now.toLocaleDateString('tr-TR') + ' ' + now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
            
            trades.push({ sym, profit: (sell - buy) * lot, date: dateStr });
            save();
        }

        function deleteTrade(index) { trades.splice(index, 1); save(); }

        function save() {
            localStorage.setItem('trades', JSON.stringify(trades));
            updateChart();
            render();
            ['sym','buy','sell','lot','note'].forEach(id => document.getElementById(id).value = '');
        }

        function initChart() {
            const ctx = document.getElementById('profitChart').getContext('2d');
            myChart = new Chart(ctx, { type: 'line', data: { datasets: [{ label: 'Bakiye', borderColor: '#10b981', fill: true, tension: 0.3 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
            updateChart();
        }

        function updateChart() {
            let cumulative = 0;
            const data = [0, ...trades.map(t => cumulative += t.profit)];
            myChart.data.labels = [...Array(data.length).keys()];
            myChart.data.datasets[0].data = data;
            myChart.update();
            document.getElementById('stats').innerText = `${cumulative.toFixed(2)} ₺`;
        }

        function render() {
            document.getElementById('history-table').innerHTML = trades.map((t, i) => `
                <tr class="border-b border-gray-900">
                    <td class="py-3 text-gray-400">${t.date}</td>
                    <td class="py-3 font-bold">${t.sym}</td>
                    <td class="py-3 text-right font-mono ${t.profit >= 0 ? 'text-emerald-400' : 'text-red-400'}">${t.profit.toFixed(2)} ₺</td>
                </tr>
            `).reverse().join('');
        }
    </script>
</body>
</html>
